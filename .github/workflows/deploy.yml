name: Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code (just for reference, not used on EC2)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment on EC2..."

            # Navigate to project directory
            cd ~/Giftyzet-celebration || exit 1

            # Ensure the repo is clean and on the correct branch
            git reset --hard
            git clean -fd
            git fetch --all
            git checkout main
            git pull origin main

            echo "✅ Pulled latest code from main"

            # Backup old .env.production
            if [ -f .env.production ]; then
              cp .env.production .env.production.bak
              echo "💾 Backed up old .env.production"
            fi

            # Write latest secrets to .env.production
            echo "Writing environment variables..."
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.production
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.production
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" >> .env.production
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env.production
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env.production
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env.production
            echo "RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}" >> .env.production
            echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env.production
            echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env.production
            echo "TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}" >> .env.production

            echo "✅ Environment variables updated"

            # Install dependencies (only if package.json changed)
            echo "Installing dependencies..."
            npm install

            # Build the Next.js app
            echo "Building Next.js app..."
            npm run build

            # Restart or start PM2
            echo "Restarting PM2..."
            pm2 describe your_app_name >/dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart your_app_name
            else
              pm2 start npm --name "your_app_name" -- start
            fi

            echo "✅ Deployment complete!"